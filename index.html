<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serene Diary - Rose & Serenity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="date-navigator">
                <button class="nav-btn" id="prev-day" title="이전날">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <div class="current-date-container" id="date-display" title="달력 보기">
                    <span id="date-text">2026. 04. 27 (월)</span>
                </div>
                <button class="nav-btn" id="next-day" title="다음날">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
            </div>
            <p class="subtitle">Personal Serene Diary</p>
        </header>

        <!-- Custom Calendar Modal -->
        <div class="calendar-modal" id="calendar-modal">
            <div class="calendar-header">
                <h3 id="cal-month-year">2026년 4월</h3>
                <div class="calendar-nav-btns">
                    <button class="cal-btn" id="cal-prev-month"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                    <button class="cal-btn" id="cal-next-month"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
                </div>
            </div>
            <div class="calendar-weekdays">
                <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
            </div>
            <div class="calendar-days" id="calendar-days"></div>
        </div>

        <div class="input-wrapper">
            <div class="input-group">
                <input type="text" id="memo-input" placeholder="오늘 어떤 일을 할까요?" autocomplete="off">
                <button id="add-btn">추가</button>
            </div>
        </div>

        <ul id="memo-list"></ul>

        <div id="empty-msg" class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--serenity); opacity: 0.5;"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"></path><line x1="16" y1="8" x2="2" y2="22"></line><line x1="17.5" y1="15" x2="9" y2="15"></line></svg>
            <p>이 날의 기록이 없습니다.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
